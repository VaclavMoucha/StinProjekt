<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-cs="Směnárenská stránka" data-en="Currency App">
      Currency App
    </title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav>
      <span data-cs="Směnárenská stránka" data-en="Currency App"
        >Currency App</span
      >
      <div>
        <a href="index.html" data-cs="Měny" data-en="Dashboard">Dashboard</a>
        <a href="settings.html" data-cs="Nastavení" data-en="Settings"
          >Settings</a
        >
        <a class="langButton" data-cs="EN" data-en="CS">CS</a>
        <form action="/logout" method="POST" class="logout-form">
          <button
            type="submit"
            class="logout-link"
            data-cs="Odhlásit"
            data-en="Logout"
          >
            Logout
          </button>
        </form>
      </div>
    </nav>

    <div class="container">
      <div
        class="api-error"
        id="api-error"
        data-cs="Api není dostupné"
        data-en="Api is not available"
      >
        Api is not available
      </div>

      <div class="card">
        <h2 data-cs="Aktuální kurzy" data-en="Current Rates">Current Rates</h2>
        <table>
          <thead>
            <tr>
              <th data-cs="Měna" data-en="Currency">Currency</th>
              <th data-cs="Kurz" data-en="Rate">Rate</th>
            </tr>
          </thead>
          <tbody id="rates-table">
            <tr>
              <td colspan="2" data-cs="Načítání..." data-en="Loading...">
                Loading...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <h2 data-cs="Analýza" data-en="Analysis">Analysis</h2>
        <p data-cs="Nejsilnější měna: " data-en="Strongest currency: ">
          Strongest currency:
          <br>
        </p>
        <strong id="strongest">-</strong>
        <p data-cs="Nejslabší měna: " data-en="Weakest currency: ">
          Weakest currency:
          <br>
        </p>
        <strong id="weakest">-</strong>
      </div>

      <div class="card">
        <h2 data-cs="Průměr za období" data-en="Average over period">
          Average over period
        </h2>
        <div class="form-group">
          <label data-cs="Od" data-en="From">From</label>
          <input type="date" id="from-date" />
        </div>
        <div class="form-group">
          <label data-cs="Do" data-en="To">To</label>
          <input type="date" id="to-date" />
        </div>
        <button
          onclick="loadAverage()"
          data-cs="Vypočítat průměr"
          data-en="Calculate Average"
        >
          Calculate Average
        </button>
        <table style="margin-top: 15px">
          <thead>
            <tr>
              <th data-cs="Měna" data-en="Currency">Currency</th>
              <th data-cs="Průměrný kurz" data-en="Average Rate">
                Average Rate
              </th>
            </tr>
          </thead>
          <tbody id="average-table"></tbody>
        </table>
      </div>

      <div class="card">
        <h2
          data-cs="Historický vývoj kurzů"
          data-en="Historical Rate Development"
        >
          Historical Rate Development
        </h2>
        <div class="form-group">
          <label data-cs="Od" data-en="From">From</label>
          <input type="date" id="chart-from-date" />
        </div>
        <div class="form-group">
          <label data-cs="Do" data-en="To">To</label>
          <input type="date" id="chart-to-date" />
        </div>
        <button
          onclick="loadChart()"
          data-cs="Zobrazit graf"
          data-en="Show Chart"
        >
          Show Chart
        </button>
        <canvas id="historicalChart" style="margin-top: 15px"></canvas>
      </div>
    </div>

    <script src="js/index.js"></script>
  </body>
</html>
